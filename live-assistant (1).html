<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播实时助手</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --green: #00d4aa;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --muted: #666680;
    --red: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .app-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  .status-dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .spacer { flex: 1; }

  /* API KEY input */
  .api-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .api-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .api-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    width: 200px;
    outline: none;
  }
  .api-input:focus { border-color: var(--accent); }

  /* Control buttons */
  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.primary:hover { background: #6a4de8; }
  .btn.danger { background: var(--red); border-color: var(--red); color: white; }
  .btn.danger:hover { background: #e05555; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn .dot { width:6px;height:6px;border-radius:50%;background:currentColor; }

  /* ── MAIN GRID ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-num {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 1px;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 500;
    flex: 1;
  }
  .panel-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid;
  }
  .panel-badge.jp { color: var(--yellow); border-color: var(--yellow); background: rgba(255,209,102,0.08); }
  .panel-badge.ai { color: var(--accent); border-color: var(--accent); background: rgba(124,92,252,0.08); }
  .panel-badge.zh { color: var(--green); border-color: var(--green); background: rgba(0,212,170,0.08); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── PANEL 1: STT ── */
  .stt-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    animation: slideIn 0.3s ease;
  }
  .stt-entry.interim {
    background: rgba(124,92,252,0.06);
    border-color: rgba(124,92,252,0.3);
  }
  .stt-time {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .stt-text {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  .stt-entry.interim .stt-text { color: rgba(232,232,240,0.6); }

  /* interim typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 8px 0 2px;
  }
  .typing-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  /* ── PANEL 2: AI RESPONSE ── */
  .ai-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    animation: slideIn 0.4s ease;
  }
  .ai-card:hover { border-color: var(--accent); background: rgba(124,92,252,0.06); }
  .ai-card.speaking {
    border-color: var(--accent2);
    background: rgba(252,92,125,0.06);
  }
  .ai-card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ai-card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .ai-card-tag.answer { background: rgba(124,92,252,0.2); color: var(--accent); }
  .ai-card-tag.product { background: rgba(255,209,102,0.15); color: var(--yellow); }
  .ai-card-tag.warm { background: rgba(0,212,170,0.15); color: var(--green); }
  .ai-card-tag.thanks { background: rgba(252,92,125,0.15); color: var(--accent2); }
  .ai-card-time {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-left: auto;
  }
  .ai-card-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .ai-card-speak {
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ai-card:hover .ai-card-speak { opacity: 1; }
  .ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: 10px;
    font-size: 12px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }

  /* ── PANEL 3: TRANSLATION ── */
  .trans-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    animation: slideIn 0.5s ease;
  }
  .trans-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.6;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }
  .trans-host {
    font-size: 13px;
    line-height: 1.6;
    color: var(--yellow);
    padding-left: 6px;
    border-left: 2px solid var(--yellow);
    margin-bottom: 4px;
    opacity: 0.9;
  }
  .trans-zh {
    font-size: 14px;
    line-height: 1.7;
    color: var(--green);
  }
  .trans-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── BOTTOM BAR ── */
  .bottombar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .volume-bar {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 20px;
  }
  .vol-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--border);
    transition: height 0.1s, background 0.1s;
  }
  .vol-bar.active { background: var(--green); }
  .info-text {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }
  .context-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    font-family: inherit;
  }
  .context-input:focus { border-color: var(--accent); }
  .context-input::placeholder { color: var(--muted); font-size: 11px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 36px; opacity: 0.4; }
  .empty-text { font-size: 12px; line-height: 1.6; max-width: 180px; }

  /* TTS controls */
  .tts-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  select.voice-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    outline: none;
    cursor: pointer;
  }

  /* Clear btn */
  .clear-btn {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .clear-btn:hover { color: var(--red); }

  /* Speaking animation on card */
  @keyframes speakPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(252,92,125,0); }
    50% { box-shadow: 0 0 0 6px rgba(252,92,125,0.2); }
  }
  .ai-card.speaking { animation: speakPulse 0.8s infinite; }

  /* Stream cursor */
  .stream-cursor {
    display: inline-block;
    color: var(--accent);
    animation: blink 0.7s infinite;
    font-size: 12px;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Archive list items */
  .archive-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .archive-item:hover { border-color: var(--accent); background: rgba(124,92,252,0.06); }
  .archive-item-info { flex: 1; }
  .archive-item-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); margin-bottom: 4px; }
  .archive-item-ctx { font-size: 12px; color: var(--muted); }
  .archive-item-right { display: flex; align-items: center; gap: 10px; }
  .archive-item-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(124,92,252,0.12); padding: 3px 10px; border-radius: 10px; }
  .archive-delete-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .archive-delete-btn:hover { border-color: var(--red); color: var(--red); }
  .archive-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; }

  /* ── CAT AVATAR ── */
  #catWrap {
    position: fixed;
    bottom: 10px;
    right: 16px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  #catAvatar {
    width: 100px;
    height: 140px;
    cursor: pointer;
    filter: drop-shadow(0 6px 20px rgba(124,92,252,0.3)) drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    transition: transform 0.2s;
    user-select: none;
  }
  #catAvatar:hover { transform: scale(1.06) translateY(-3px); }
  #catAvatar.talking { animation: catBounce 0.3s infinite alternate; }
  #catAvatar.excited { animation: catJump 0.6s ease; }
  @keyframes catBounce { from{transform:translateY(0) rotate(-2deg)} to{transform:translateY(-8px) rotate(2deg)} }
  @keyframes catJump { 0%{transform:translateY(0)} 30%{transform:translateY(-18px) scale(1.05)} 60%{transform:translateY(-10px) scale(1.08)} 80%{transform:translateY(-20px) rotate(-5deg)} 100%{transform:translateY(0) rotate(0)} }

  /* Character switcher bar */
  #catSwitcher {
    display: flex;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 8px;
  }
  .cat-opt {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    background: var(--surface2);
  }
  .cat-opt:hover { transform: scale(1.2); }
  .cat-opt.active { border-color: var(--accent); background: rgba(124,92,252,0.2); }

  #catBubble {
    position: fixed;
    bottom: 165px;
    right: 16px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 14px 14px 4px 14px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    max-width: 200px;
    z-index: 501;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    line-height: 1.6;
  }
  #catBubble.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="app-title">Live Assistant</div>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-text" id="statusText">未开始</div>
  <div class="spacer"></div>
  <div class="api-input-wrap">
    <span class="api-label">API Key</span>
    <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-... 或 sk-..." />
  </div>
  <div class="tts-controls">
    <span id="vvStatus" style="font-family:monospace;font-size:9px;color:#666680;white-space:nowrap;">⚫ VOICEVOX</span>
    <select class="voice-select" id="voiceSelect" onchange="onVoiceChange(this.value)" style="max-width:160px;">
      <option value="">检测中...</option>
    </select>
  </div>
  <button class="btn primary" id="startBtn" onclick="toggleListening()">
    <div class="dot"></div> 开始监听
  </button>
  <button class="btn" id="testBtn" onclick="testWithSample()">测试</button>
  <button class="btn" id="autoPlayBtn" onclick="toggleAutoPlay()">🎙️ 实时回复</button>
  <button class="btn" id="archiveBtn" onclick="archiveSession()" title="归档本次直播记录">
    📦 归档
  </button>
  <button class="btn" id="historyBtn" onclick="openArchiveModal()" style="position:relative;">
    🗂 历史
    <span id="archiveBadge" style="display:none;position:absolute;top:-6px;right:-6px;background:var(--accent2);color:white;border-radius:10px;font-size:9px;padding:1px 5px;min-width:16px;text-align:center;"></span>
  </button>
</div>

<!-- MAIN PANELS -->
<div class="main">

  <!-- PANEL 1: STT -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-num">01</div>
      <div class="panel-title">主播语音 → 文字</div>
      <span class="panel-badge jp">日文 STT</span>
      <button class="clear-btn" onclick="clearPanel('stt')">清除</button>
    </div>
    <div class="panel-body" id="sttPanel">
      <div class="empty-state" id="sttEmpty">
        <div class="empty-icon">🎙️</div>
        <div class="empty-text">点击"开始监听"后，主播说的日语会实时显示在这里</div>
      </div>
    </div>
  </div>

  <!-- PANEL 2: AI Response -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-num">02</div>
      <div class="panel-title">AI 生成互动话术</div>
      <span class="panel-badge ai">点击即可朗读</span>
      <button class="clear-btn" onclick="clearPanel('ai')">清除</button>
    </div>
    <div class="panel-body" id="aiPanel">
      <div class="empty-state" id="aiEmpty">
        <div class="empty-icon">💬</div>
        <div class="empty-text">AI 会根据主播说的话，自动生成你可以说的互动回应</div>
      </div>
    </div>
  </div>

  <!-- PANEL 3: Translation -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-num">03</div>
      <div class="panel-title">中文翻译</div>
      <span class="panel-badge zh">日语 → 中文</span>
      <button class="clear-btn" onclick="clearPanel('trans')">清除</button>
    </div>
    <div class="panel-body" id="transPanel">
      <div class="empty-state" id="transEmpty">
        <div class="empty-icon">🌐</div>
        <div class="empty-text">主播说的日语和 AI 建议的话，都会翻译成中文显示在这里</div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="volume-bar" id="volumeBar">
    <div class="vol-bar" style="height:6px"></div>
    <div class="vol-bar" style="height:10px"></div>
    <div class="vol-bar" style="height:8px"></div>
    <div class="vol-bar" style="height:14px"></div>
    <div class="vol-bar" style="height:6px"></div>
    <div class="vol-bar" style="height:10px"></div>
    <div class="vol-bar" style="height:8px"></div>
  </div>
  <div class="info-text" id="langInfo">语言: 日语 (ja-JP)</div>
  <input class="context-input" id="contextInput"
    placeholder="直播场景备注（可选）：如 美妆直播 / 卖护肤品 / 今天主推XX产品…" />
  <span class="info-text" id="entryCount">0 条记录</span>
</div>

<script>
// ── STATE ──
let recognition = null;
let isListening = false;
let currentInterimEl = null;
let apiKey = '';
let isSpeaking = false;
let currentSpeakCard = null;
let entryCount = 0;
let autoPlay = false;
let speakQueue = [];
let isSpeakingQueue = false;
// Archive state
let archives = [];
try { archives = JSON.parse(localStorage.getItem('la_archives') || '[]'); } catch(e){ archives = []; }

// ── INIT VOICES ──
// VOICEVOX character list (speaker ID → name)
const VV_SPEAKERS = [
  { id: 3,  label: '🟢 ずんだもん',     style: 'ノーマル' },
  { id: 1,  label: '🌸 四国めたん',     style: 'ノーマル' },
  { id: 8,  label: '🧡 春日部つむぎ',   style: 'ノーマル' },

// ── SPEECH RECOGNITION ──
function toggleListening() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) {
    alert('请先输入 API Key（Anthropic 或 OpenAI 均可）');
    return;
  }
  apiKey = key;

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('您的浏览器不支持语音识别，请使用 Chrome 浏览器');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    updateStatus('listening');
    document.getElementById('startBtn').textContent = '⏹ 停止监听';
    document.getElementById('startBtn').className = 'btn danger';
  };

  let interimDebounceTimer = null;
  let lastInterimText = '';

  recognition.onresult = (event) => {
    let interim = '';
    let finalText = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += t;
      } else {
        interim += t;
      }
    }

    if (interim) {
      showInterim(interim);
      // Debounce: if interim pauses for 800ms, treat as a sentence and trigger AI
      clearTimeout(interimDebounceTimer);
      lastInterimText = interim;
      interimDebounceTimer = setTimeout(() => {
        if (lastInterimText.length > 3) {
          removeInterim();
          addSTTEntry(lastInterimText.trim());
          triggerAI(lastInterimText.trim());
          lastInterimText = '';
        }
      }, 800);
    }
    if (finalText) {
      clearTimeout(interimDebounceTimer);
      lastInterimText = '';
      removeInterim();
      addSTTEntry(finalText.trim());
      triggerAI(finalText.trim());
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') {
      console.error('STT error:', e.error);
      updateStatus('error');
    }
  };

  recognition.onend = () => {
    if (isListening) {
      // auto restart
      setTimeout(() => { if (isListening) recognition.start(); }, 500);
    }
  };

  recognition.start();
  document.getElementById('sttEmpty').style.display = 'none';
  document.getElementById('aiEmpty').style.display = 'none';
  document.getElementById('transEmpty').style.display = 'none';
}

function stopListening() {
  isListening = false;
  if (recognition) { recognition.stop(); recognition = null; }
  updateStatus('stopped');
  document.getElementById('startBtn').innerHTML = '<div class="dot"></div> 开始监听';
  document.getElementById('startBtn').className = 'btn primary';
  removeInterim();
}

async function callAIStream(text) {
  const context = document.getElementById('contextInput').value.trim();
  updateStatus('processing');

  const aiPanel = document.getElementById('aiPanel');
  const transPanel = document.getElementById('transPanel');

  // 创建流式AI卡片占位
  const cardEl = document.createElement('div');
  cardEl.className = 'ai-card streaming';
  const now = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  cardEl.innerHTML = `
    <div class="ai-card-meta">
      <span class="ai-card-tag answer" id="cardTag_${Date.now()}">生成中</span>
      <span class="ai-card-time">${now}</span>
    </div>
    <div class="ai-card-text stream-text"><span class="stream-cursor">▋</span></div>
    <div class="ai-card-speak">🔊</div>`;
  aiPanel.appendChild(cardEl);
  aiPanel.scrollTop = aiPanel.scrollHeight;

  // 翻译面板占位
  const transEl = document.createElement('div');
  transEl.className = 'trans-entry';
  transEl.innerHTML = `
    <div class="trans-label">主播说（日语）</div>
    <div class="trans-jp">${escHtml(text)}</div>
    <div class="trans-label" style="margin-top:6px">主播说（中文）</div>
    <div class="trans-host" id="host_${uid}"><span class="stream-cursor">▋</span></div>
    <div class="trans-label" style="margin-top:8px">AI回复建议</div>
    <div class="trans-zh stream-trans"><span class="stream-cursor">▋</span></div>`;
  transPanel.appendChild(transEl);
  transPanel.scrollTop = transPanel.scrollHeight;

  const streamTextEl = cardEl.querySelector('.stream-text');
  const streamTransEl = transEl.querySelector('.stream-trans');
  const tagEl = cardEl.querySelector('[id^="cardTag_"]');

  const systemPrompt = `You are an ENERGETIC live commerce hype assistant. You watch a Japanese live stream host and generate EXCITED, HIGH-ENERGY Japanese comments like a passionate viewer who wants to buy everything.

Rules:
- Reply in JSON only. No markdown. No extra text.
- "text": 1 excited Japanese sentence, max 30 chars, use やばい/絶対/最高/今すぐ/神, always use ！！
- "translation": Chinese translation of your Japanese comment
- "host_cn": Chinese translation of what the HOST said (the input text)
- "response_type": "answer" | "product" | "warm" | "thanks"
- NEVER sound calm — always maximum energy
${context ? `Stream context: ${context}` : ''}

Output ONLY this JSON (no markdown):
{"text":"やばい！絶対買う！！","response_type":"warm","translation":"太棒了！绝对要买！！","host_cn":"主播说的话的中文翻译"}`;

  try {
    let fullText = '';

    if (apiKey.startsWith('sk-ant')) {
      // Anthropic 流式
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 200,
          stream: true,
          system: systemPrompt,
          messages: [{ role: 'user', content: `配信者が言った言葉: 「${text}」` }]
        })
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.type === 'content_block_delta' && data.delta?.text) {
                fullText += data.delta.text;
                updateStreamDisplay(fullText, streamTextEl, streamTransEl, tagEl, cardEl);
              }
            } catch(e) {}
          }
        }
      }
    } else {
      // OpenAI 流式
      const resp = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          max_tokens: 200,
          stream: true,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: `配信者が言った言葉: 「${text}」` }
          ]
        })
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              const data = JSON.parse(line.slice(6));
              const delta = data.choices?.[0]?.delta?.content;
              if (delta) {
                fullText += delta;
                updateStreamDisplay(fullText, streamTextEl, streamTransEl, tagEl, cardEl);
              }
            } catch(e) {}
          }
        }
      }
    }

    // 流式完成，最终解析
    console.log('=== AI RAW OUTPUT ===', JSON.stringify(fullText));
    finalizeCard(fullText, streamTextEl, streamTransEl, tagEl, cardEl, text);

  } catch (err) {
    console.error(err);
    cardEl.remove();
    transEl.remove();
  }

  if (isListening) updateStatus('listening');
  else updateStatus('stopped');
}

// 从流式JSON中提取字段值（处理不完整的JSON）
function extractJsonField(raw, field) {
  // 方法1：完整JSON解析
  try {
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    if (parsed[field] !== undefined) return String(parsed[field]);
  } catch(e) {}

  // 方法2：正则匹配（处理流式不完整情况）
  // 匹配 "field": "value（可能未结束）
  const re = new RegExp('"' + field + '"\\s*:\\s*"((?:[^"\\\\]|\\\\.)*)"?');
  const m = raw.match(re);
  if (m) {
    return m[1].replace(/\\n/g,'\n').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
  }

  // 方法3：匹配到引号开始但还没结束（流式进行中）
  const rePartial = new RegExp('"' + field + '"\\s*:\\s*"([^]*)$');
  const mp = raw.match(rePartial);
  if (mp) {
    return mp[1].replace(/\\n/g,'\n').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
  }

  return null;
}

function updateStreamDisplay(raw, streamTextEl, streamTransEl, tagEl, cardEl) {
  const textVal = extractJsonField(raw, 'text');
  const transVal = extractJsonField(raw, 'translation');
  const hostCnVal = extractJsonField(raw, 'host_cn');

  if (textVal !== null && textVal.trim()) {
    streamTextEl.innerHTML = escHtml(textVal) + '<span class="stream-cursor">▋</span>';
  }
  if (transVal !== null && transVal.trim()) {
    streamTransEl.innerHTML = escHtml(transVal) + '<span class="stream-cursor">▋</span>';
  }
  // Find the host_cn element by looking up the uid from the cardEl
  const uid = cardEl.querySelector('[id^="cardTag_"]')?.id?.replace('cardTag_','');
  if (uid && hostCnVal !== null && hostCnVal.trim()) {
    const hostEl = document.getElementById('host_' + uid);
    if (hostEl) hostEl.innerHTML = escHtml(hostCnVal) + '<span class="stream-cursor">▋</span>';
  }
  document.getElementById('aiPanel').scrollTop = 99999;
  document.getElementById('transPanel').scrollTop = 99999;
}

function finalizeCard(raw, streamTextEl, streamTransEl, tagEl, cardEl, sourceText) {
  const tagLabels = { answer:'回答', product:'商品', warm:'暖场', thanks:'感谢' };

  // 优先完整JSON解析
  let parsed = null;
  try {
    parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch(e) {
    // JSON不完整，用正则兜底
  }

  const textVal = parsed?.text || extractJsonField(raw, 'text') || streamTextEl.textContent.replace('▋','').trim();
  const transVal = parsed?.translation || extractJsonField(raw, 'translation') || streamTransEl.textContent.replace('▋','').trim();
  const typeVal = parsed?.response_type || extractJsonField(raw, 'response_type') || 'answer';

  if (tagEl) {
    tagEl.className = `ai-card-tag ${typeVal}`;
    tagEl.textContent = tagLabels[typeVal] || typeVal;
  }
  streamTextEl.innerHTML = escHtml(textVal || '（生成失败）');
  streamTransEl.innerHTML = escHtml(transVal || '（翻译失败）');
  // Finalize host Chinese translation
  const uid2 = cardEl.querySelector('[id^="cardTag_"]')?.id?.replace('cardTag_','');
  if (uid2) {
    const hostCnVal = parsed?.host_cn || extractJsonField(raw, 'host_cn') || '';
    const hostEl = document.getElementById('host_' + uid2);
    if (hostEl) hostEl.innerHTML = escHtml(hostCnVal);
  }
  cardEl.classList.remove('streaming');
  if (textVal) cardEl.onclick = () => speakText(textVal, cardEl);
  enqueueSpeak(textVal, cardEl);
}

// ── TTS ──
function speakText(text, cardEl) {
  // Manual click: cancel queue and speak immediately
  speechSynthesis.cancel();
  speakQueue = [];
  isSpeakingQueue = false;
  if (currentSpeakCard) currentSpeakCard.classList.remove('speaking');
  doSpeak(text, cardEl);
}

function enqueueSpeak(text, cardEl) {
  if (!autoPlay) return;
  speakQueue.push({ text, cardEl });
  if (!isSpeakingQueue) processSpeak();
}

function processSpeak() {
  if (!speakQueue.length) { isSpeakingQueue = false; return; }
  isSpeakingQueue = true;
  const { text, cardEl } = speakQueue.shift();
  doSpeak(text, cardEl, processSpeak);
}

async function doSpeak(text, cardEl, onDone) {
  if (currentSpeakCard) currentSpeakCard.classList.remove('speaking');
  currentSpeakCard = cardEl;
  if (cardEl) cardEl.classList.add('speaking');
  setCatState('talking');
  isSpeaking = true;

  const voiceVal = document.getElementById('voiceSelect').value;
  const done = () => {
    isSpeaking = false;
    if (cardEl) cardEl.classList.remove('speaking');
    currentSpeakCard = null;
    setCatState('idle');
    if (onDone) onDone();
  };

  if (vvOnline && voiceVal.startsWith('vv_')) {
    // ── VOICEVOX TTS ──
    const speakerId = parseInt(voiceVal.replace('vv_', ''));
    try {
      // Step 1: audio_query
      const qResp = await fetch(
        `http://localhost:50021/audio_query?text=${encodeURIComponent(text)}&speaker=${speakerId}`,
        { method: 'POST', signal: AbortSignal.timeout(8000) }
      );
      const query = await qResp.json();

      // Tune for hype energy: faster + slightly higher pitch
      query.speedScale = 1.2;
      query.pitchScale = 0.08;
      query.intonationScale = 1.4;
      query.volumeScale = 1.5;
      query.prePhonemeLength = 0.05;
      query.postPhonemeLength = 0.05;

      // Step 2: synthesis
      const sResp = await fetch(
        `http://localhost:50021/synthesis?speaker=${speakerId}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(query), signal: AbortSignal.timeout(10000) }
      );
      const blob = await sResp.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); done(); };
      audio.onerror = done;
      audio.play();
    } catch(e) {
      console.warn('VOICEVOX error, fallback to system TTS', e);
      speakFallback(text, done);
    }
  } else {
    // ── System TTS fallback ──
    speakFallback(text, done);
  }
}

function speakFallback(text, done) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.pitch = 1.4;
  utter.rate = 1.1;
  const voiceVal = document.getElementById('voiceSelect').value;
  if (voiceVal && !voiceVal.startsWith('vv_')) {
    const v = speechSynthesis.getVoices().find(v => v.name === voiceVal);
    if (v) utter.voice = v;
  }
  utter.onend = done;
  utter.onerror = done;
  speechSynthesis.speak(utter);
}

function toggleAutoPlay() {
  autoPlay = !autoPlay;
  const btn = document.getElementById('autoPlayBtn');
  if (autoPlay) {
    btn.className = 'btn danger';
    btn.innerHTML = '🔴 实时回复 ON';
    setCatState('excited');
    setTimeout(() => setCatState('idle'), 1500);
  } else {
    btn.className = 'btn';
    btn.innerHTML = '🎙️ 实时回复';
    speechSynthesis.cancel();
    speakQueue = [];
    isSpeakingQueue = false;
    setCatState('idle');
  }
}

function animateVolume() {
  const bars = document.querySelectorAll('.vol-bar');
  bars.forEach(b => {
    b.classList.add('active');
    b.style.height = Math.random() * 18 + 4 + 'px';
  });
  setTimeout(() => {
    bars.forEach(b => {
      b.classList.remove('active');
      b.style.height = '6px';
    });
  }, 400);
}

let currentCharIdx = 0;
let catState = 'idle';
let catBubbleTimer = null;

function selectChar(idx) {
  currentCharIdx = idx;
  document.querySelectorAll('.cat-opt').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const char = CHARS[idx];
  const svg = document.getElementById('catAvatar');
  char.draw(svg);
  document.getElementById('catBubble').style.borderColor = char.bubbleBorder;
  showCatBubble(char.name + ' にゃん！✨');
  try { localStorage.setItem('la_char', idx); } catch(e) {}
}

function setCatState(state) {
  const cat = document.getElementById('catAvatar');
  const eyeL = document.getElementById('catEyeL');
  const eyeR = document.getElementById('catEyeR');
  const mouth = document.getElementById('catMouth');
  if (!eyeL || !eyeR) return;
  cat.classList.remove('talking','excited');
  catState = state;
  const baseRy = currentCharIdx === 1 ? 6.5 : currentCharIdx === 2 ? 9 : 8;

  if (state === 'talking') {
    cat.classList.add('talking');
    const char = CHARS[currentCharIdx];
    showCatBubble(char.phrases[Math.floor(Math.random()*char.phrases.length)]);
    eyeL.setAttribute('ry', Math.max(3, baseRy-3));
    eyeR.setAttribute('ry', Math.max(3, baseRy-3));
    if (mouth) mouth.setAttribute('d', mouth.getAttribute('d').replace(/Q\d+,\d+/, m => {
      const parts = m.split(','); return parts[0]+','+(parseInt(parts[1])+6);
    }));
  } else if (state === 'excited') {
    cat.classList.add('excited');
    showCatBubble('🔴 実時返信 ON！！やばい！！🎉');
    eyeL.setAttribute('ry', baseRy+2);
    eyeR.setAttribute('ry', baseRy+2);
  } else {
    eyeL.setAttribute('ry', baseRy);
    eyeR.setAttribute('ry', baseRy);
  }
}

function showCatBubble(text) {
  const bubble = document.getElementById('catBubble');
  bubble.textContent = text;
  bubble.classList.add('show');
  clearTimeout(catBubbleTimer);
  catBubbleTimer = setTimeout(() => bubble.classList.remove('show'), 3000);
}

function catClick() {
  if (catState === 'talking') return;
  const char = CHARS[currentCharIdx];
  const phrase = char.idle[Math.floor(Math.random()*char.idle.length)];
  setCatState('excited');
  showCatBubble(phrase);
  setTimeout(() => setCatState('idle'), 1000);
}

setInterval(() => {
  if (catState !== 'idle') return;
  const eyeL = document.getElementById('catEyeL');
  const eyeR = document.getElementById('catEyeR');
  if (!eyeL) return;
  const cur = parseFloat(eyeL.getAttribute('ry'));
  eyeL.setAttribute('ry','1'); eyeR.setAttribute('ry','1');
  setTimeout(() => { eyeL.setAttribute('ry', cur); eyeR.setAttribute('ry', cur); }, 150);
}, 3200);

setInterval(() => {
  if (catState !== 'idle') return;
  if (Math.random() > 0.4) return;
  const char = CHARS[currentCharIdx];
  showCatBubble(char.idle[Math.floor(Math.random()*char.idle.length)]);
}, 8000);

// Init
try {
  const saved = parseInt(localStorage.getItem('la_char') || '0');
  selectChar(isNaN(saved) ? 0 : saved);
} catch(e) { selectChar(0); }
</script>
